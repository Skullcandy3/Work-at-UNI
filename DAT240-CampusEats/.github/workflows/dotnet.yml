name: CampusEats CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test-and-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Build first (fast failure)
      - name: Restore
        run: dotnet restore CampusEatsv2/CampusEatsv2.slnx

      - name: Build
        run: dotnet build CampusEatsv2/CampusEatsv2.slnx --no-restore --configuration Release

      # Start required infrastructure
      - name: Docker Compose Up
        if: github.ref == 'refs/heads/main'
        working-directory : CampusEatsv2
        run: docker compose up -d --build

      - name: Wait for RabbitMQ
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Waiting for RabbitMQ..."
          for i in {1..30}; do
            if docker exec campuseats_rabbitmq rabbitmq-diagnostics ping; then
              echo "RabbitMQ is ready"
              exit 0
            fi
            sleep 2
          done
          echo "RabbitMQ did not become ready in time"
          exit 1

      # Run tests (integration tests now PASS)
      - name: Run tests
        run: dotnet test CampusEatsv2/CampusEatsv2.slnx --no-build --configuration Release

      # Always clean up
      - name: Docker Compose Down
        if: always() && github.ref == 'refs/heads/main'
        working-directory : CampusEatsv2
        run: docker compose down